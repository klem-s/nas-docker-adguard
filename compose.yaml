services:
  # ─────────────────────────────────────────
  #  ADGUARD – STOP PUB
  # ─────────────────────────────────────────
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    volumes:
      - ${CONFIG}/adguard/work:/opt/adguardhome/work
      - ${CONFIG}/adguard/conf:/opt/adguardhome/conf
    networks:
      - proxy
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3002:3000/tcp"
    restart: unless-stopped

networks:
  proxy:
    external: true
